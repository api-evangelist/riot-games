specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Riot Games
providerId: riot-games
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Esports
  - Gaming
  - League of Legends
  - VALORANT
  - Teamfight Tactics
description: >-
  The Riot Games Developer API is free to use and gated by access tier rather than price.
  Three key tiers exist: short-lived Development keys for prototyping, Personal keys for
  individual developers and small private communities, and Production keys for approved
  public products. Monetization is allowed for approved/acknowledged products under specific
  policy constraints (must keep a free tier, no betting, must be transformative when charging
  players); Riot itself does not charge for API access.
sources:
  - https://developer.riotgames.com/docs/portal
  - https://developer.riotgames.com/api-keys.html
  - https://developer.riotgames.com/policies.html
plans:
  - id: riot-games-development-key
    name: Development Key
    type: freemium
    description: >-
      Temporary key for prototyping and exploration. Deactivates every 24 hours; not suitable
      for any sustained or public workload.
    entries:
      - label: Burst limit
        name: dev_key_burst
        type: tiered
        metric: requests_per_second
        limit: 20
        timeFrame: second
        geo: per-region
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Sustained limit
        name: dev_key_sustained
        type: tiered
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: per-region
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 24-Hour Key Rotation
      - name: All Public Riot APIs
      - name: Free
  - id: riot-games-personal-key
    name: Personal Key
    type: freemium
    description: >-
      Free tier for individual developers and small private communities. Same published rate
      limits as a development key but without the 24-hour rotation. Cannot back public
      consumption or commercial products.
    entries:
      - label: Burst limit
        name: personal_key_burst
        type: tiered
        metric: requests_per_second
        limit: 20
        timeFrame: second
        geo: per-region
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Sustained limit
        name: personal_key_sustained
        type: tiered
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: per-region
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: All Public Riot APIs
      - name: Free
      - name: Private / Small Community Use
  - id: riot-games-production-key
    name: Production Key
    type: freemium
    description: >-
      Free tier for approved public products. Issued after Developer Relations review of a
      working prototype. Higher rate limits than personal keys; expandable on request for
      developers in good standing. Monetization permitted under Riot's Developer Terms.
    entries:
      - label: Burst limit
        name: production_key_burst
        type: tiered
        metric: requests_per_10s
        limit: 500
        timeFrame: second
        geo: per-region
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Sustained limit
        name: production_key_sustained
        type: tiered
        metric: requests_per_10m
        limit: 30000
        timeFrame: minute
        geo: per-region
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: All Public Riot APIs
      - name: Free
      - name: Public Production Use Permitted
      - name: Monetization Permitted Under Developer Terms
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
