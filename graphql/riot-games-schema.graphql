# ─────────────────────────────────────────────
# Root Query
# ─────────────────────────────────────────────

type Query {
  # Account
  account(puuid: String!): Account
  accountByRiotId(gameName: String!, tagLine: String!): Account

  # Summoner
  summonerByName(region: String!, summonerName: String!): Summoner
  summonerByPuuid(region: String!, puuid: String!): Summoner
  summonerById(region: String!, summonerId: String!): Summoner

  # Champion Data (Data Dragon)
  champions(version: String, locale: String): [Champion]
  champion(id: String!, version: String): ChampionDetail
  championRotation(region: String!): ChampionRotation

  # Items
  items(version: String, locale: String): [Item]
  item(id: Int!, version: String): ItemDetail

  # Runes
  runePaths(version: String, locale: String): [RunePath]

  # Summoner Spells
  summonerSpells(version: String, locale: String): [SummonerSpell]

  # Match History (LoL)
  matchIds(puuid: String!, region: String!, queue: Int, type: String, start: Int, count: Int): [String]
  match(matchId: String!, region: String!): Match
  matchTimeline(matchId: String!, region: String!): MatchTimeline

  # Ranked
  leagueEntriesBySummoner(region: String!, summonerId: String!): [LeagueEntry]
  challengerLeague(region: String!, queue: String!): LeagueList
  grandmasterLeague(region: String!, queue: String!): LeagueList
  masterLeague(region: String!, queue: String!): LeagueList

  # Live Game
  liveGame(region: String!, summonerId: String!): LiveGame
  featuredGames(region: String!): [LiveGame]

  # Champion Mastery
  championMasteries(region: String!, puuid: String!): Masteries
  championMastery(region: String!, puuid: String!, championId: Int!): ChampionMastery
  topChampionMasteries(region: String!, puuid: String!, count: Int): [ChampionMastery]
  masteryScore(region: String!, puuid: String!): Int

  # VALORANT
  valorantMatch(matchId: String!, region: String!): ValorantMatch
  valorantMatchIds(puuid: String!, region: String!): [String]

  # TFT
  tftMatch(matchId: String!, region: String!): TFTMatch
  tftMatchIds(puuid: String!, region: String!): [String]
  tftLeagueEntries(region: String!, summonerId: String!): [LeagueEntry]

  # Game Metadata
  queues: [GameQueue]
  maps: [GameMap]
  gameModes: [GameMode]

  # Platform
  regions: [Region]
  platforms: [Platform]
}
