# Riot Games GraphQL Schema
# Covers League of Legends, VALORANT, Teamfight Tactics, Legends of Runeterra, and cross-game account APIs
# Based on https://developer.riotgames.com/apis and Data Dragon static data

scalar DateTime
scalar JSON

# ─────────────────────────────────────────────
# Account & Identity
# ─────────────────────────────────────────────

type Account {
  puuid: PUUID!
  gameName: String
  tagLine: String
  activeShards: [ActiveShard]
}

type PUUID {
  value: String!
}

type ActiveShard {
  puuid: String!
  game: String!
  activeShard: String!
}

type Summoner {
  id: SummonerID!
  accountId: String!
  puuid: String!
  name: SummonerName!
  profileIconId: Int!
  profileIcon: ProfileIcon
  revisionDate: DateTime!
  summonerLevel: SummonerLevel!
}

type SummonerID {
  value: String!
}

type SummonerName {
  value: String!
}

type SummonerLevel {
  value: Int!
}

type ProfileIcon {
  id: Int!
  image: ImageData
}

# ─────────────────────────────────────────────
# API Configuration
# ─────────────────────────────────────────────

type APIKey {
  key: String!
  owner: String
  status: String!
  rateLimits: RateLimits
  allowedOrigins: [String]
  createdAt: DateTime
  expiresAt: DateTime
}

type RateLimits {
  applicationLimits: [RateLimit]
  methodLimits: [RateLimit]
}

type RateLimit {
  requests: Int!
  seconds: Int!
}

type Region {
  id: String!
  name: String!
  endpoint: String!
  platforms: [Platform]
}

type Platform {
  id: String!
  region: String!
  host: String!
}

